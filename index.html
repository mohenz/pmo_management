<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECLUB PMO - 이슈 관리 시스템</title>
    <link rel="stylesheet" href="./css/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="app-container">
        <aside id="sidebar">
            <div class="logo">
                <i class="fas fa-shield-halved"></i> ECLUB PMO
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="nav-item active" data-view="dashboard"><i class="fas fa-dashboard"></i>
                            대시보드</a>
                    </li>
                    <li><a href="#" class="nav-item" data-view="list"><i class="fas fa-tasks"></i> 이슈 목록</a></li>
                    <li><a href="#" class="nav-item" data-view="register"><i class="fas fa-plus-circle"></i> 이슈 등록</a>
                    </li>
                    <div style="border-top: 1px solid var(--border); margin: 1.5rem 0;"></div>
                    <li><a href="#" class="nav-item" data-view="users"><i class="fas fa-user-shield"></i> PMO 멤버 관리</a>
                    </li>
                </ul>
            </nav>

            <div id="userSection"
                style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); display: none;">
                <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
                    <div style="width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;"
                        id="userAvatar">P</div>
                    <div>
                        <div style="font-size: 0.875rem; font-weight: 600; color: white;" id="userName">PMO 리더</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary);" id="userRole">Admin</div>
                    </div>
                </div>
                <button onclick="App.handleLogout()"
                    style="background: rgba(248, 81, 71, 0.1); color: #f85149; border: 1px solid rgba(248, 81, 71, 0.2); padding: 0.6rem; border-radius: 8px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.2s;">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
            <div id="loginPrompt" style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
                <button onclick="App.navigate('login')"
                    style="background: var(--accent); color: white; border: none; padding: 0.75rem; border-radius: 8px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; font-weight: 600; transition: all 0.2s;">
                    <i class="fas fa-sign-in-alt"></i> 로그인
                </button>
            </div>
        </aside>

        <main id="app">
            <!-- Content Injected via app.js -->
        </main>
    </div>

    <!-- Modals, Overlays, etc. -->
    <div id="modalOverlay" class="modal-overlay" style="display: none;">
        <div id="modalContent" class="modal-content">
            <i class="fas fa-times" onclick="App.closeModal()"
                style="position: absolute; top: 1.5rem; right: 1.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.25rem;"></i>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="module">
        import App from './js/app.js';
        window.App = App;
        App.init();
    </script>
</body>

</html>
